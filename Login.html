<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Sky Healthcare</title>

<link rel="stylesheet" href="style.css">

<style>
.login-page{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0b7dda,#33b5ff);
padding:20px;
}

.login-box{
width:100%;
max-width:420px;
background:#fff;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.login-box h2{
text-align:center;
margin-bottom:30px;
color:#0b7dda;
}

.login-box input{
width:100%;
padding:14px;
margin:12px 0;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

.login-box button{
width:100%;
padding:14px;
background:#0b7dda;
color:#fff;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
transition:.3s;
}

.login-box button:hover{
background:#075ea8;
}

.login-box p{
margin-top:20px;
text-align:center;
}
</style>

</head>

<body>

<section class="login-page">

<div class="login-box">

<h2>Sky Healthcare Login</h2>

<form>

<input type="email" placeholder="Enter Email" required>

<input type="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

<p>
Don't have an account?
<a href="register.html">Register</a>
</p>

</form>

</div>

</section>

</body>
</html>
