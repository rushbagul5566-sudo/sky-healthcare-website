.register-page{
    min-height:100vh;
    display:flex;

    background:linear-gradient(135deg,#0b7dda,#33b5ff);
    padding:20px;
}

    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.register-box h2{
    text-align:center;
    color:#0b7dda;
    margin-bottom:25px;
}

.register-box input,
.register-box select{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

    font-size:17px;
    cursor:pointer;
}

    background:#075ea8;
}
